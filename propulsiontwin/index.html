<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: allow Anthropic API calls, Google Fonts, and self
      webSecurity:false in Electron main handles the rest
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self' 'unsafe-inline' 'unsafe-eval';
        script-src  'self' 'unsafe-inline' 'unsafe-eval';
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    'self' https://fonts.gstatic.com;
        connect-src 'self' https://api.anthropic.com https://fonts.googleapis.com https://fonts.gstatic.com;
        img-src     'self' data: blob:;
      "
    />
    <title>PropulsionTwin — Digital Simulation Environment</title>
    <link rel="icon" type="image/png" href="./icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
